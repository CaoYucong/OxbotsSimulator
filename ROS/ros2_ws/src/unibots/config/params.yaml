# =============================================================================
# LOOP RATES (Hz) — edit the matching node section below when debugging
#
#   timer.publish_hz                 /time simulation clock
#   decision_node.fallback_tick_hz   target selection + dynamic waypoint (actual timer)
#   decision_node.tick_hz            launch-file compat only; unused by timer
#   ball_detection_node.infer_hz      ball inference (runs only when stopped)
#   motion_control_node.control_hz   waypoint-following control loop
#   motion_control_node.motion_status_hz   moving/stopped (gates ball infer)
#   front_camera_node.camera_poll_hz  camera JPEG capture / upstream poll
#   pose_estimation_camera.tick_hz    AprilTag + processed_image
#   motion_control_node.wheel_state_hz   wheel odometry JointState
#
# web_bridge_node.common_hz is unused (legacy); poll_hz is upstream mirror only.
# =============================================================================

web_bridge_node:
  ros__parameters:
    # Master switch for using pose_estimation to publish /current_position.
    pose_estimation_enabled: true
    # Shared frequency (Hz) used by all nodes.
    common_hz: 10.0
    # Upstream simulator host for simulation data mirror.
    remote_host: 192.168.50.2
    # Upstream simulator port for simulation data mirror.
    remote_port: 5003
    # Local bind address for the HTTP mirror server.
    local_host: 0.0.0.0
    # Local port for the HTTP mirror server.
    local_port: 5003
    # Poll rate for fetching upstream simulation data (Hz). Set to 0 when no upstream simulator.
    poll_hz: 0.0
    # HTTP timeout for upstream simulation data requests (sec).
    request_timeout: 3.0
    # ROS topic subscribed by web bridge for front camera mirroring.
    camera_topic: /front_camera
    # Mirror the pose_estimation flag into web_bridge_node behavior.
    pose_estimation: true
    # When true, post decisions/decision_making_data to web endpoints.
    web_debug: false

pose_estimation_sensor_fusion:
  ros__parameters:
    # --- Camera + wheel-odometry pose fusion ---
    # Absolute (drift-free, latent) robot-origin pose from AprilTag camera node.
    camera_pose_topic: /current_position_camera
    # High-rate left/right wheel angle (rad) + angular velocity (rad/s).
    wheel_state_topic: /wheel_joint_states
    # Fused pose output consumed by the rest of the stack.
    output_topic: /current_position
    # Driven-wheel radius (47mm diameter / 2).
    wheel_radius_m: 0.0235
    # Distance between the two rear wheels.
    wheel_track_m: 0.19
    # Robot origin sits this far forward of the wheel-axle midpoint.
    origin_forward_offset_m: 0.04
    # JointState names published by motion_control_node.
    left_wheel_joint: left_wheel_joint
    right_wheel_joint: right_wheel_joint
    # Odometry history kept to interpolate the pose at a camera timestamp (sec).
    odom_history_sec: 3.0
    # Use real ToF sensors when true; fetch upstream radar text when false.
    use_real_sensor: true
    # Upstream simulator host for radar sensor extraction.
    remote_host: 192.168.50.2
    # Upstream simulator port for radar sensor extraction.
    remote_port: 5003
    # Poll rate for fetching upstream simulation data (Hz).
    poll_hz: 10.0
    # HTTP timeout for upstream simulation data requests (sec).
    request_timeout: 3.0
    # Time topic used to stamp radar payload first field (t).
    time_topic: /time
    # TCA9548A I2C multiplexer address (all address pins low = 0x70).
    tca9548a_addr: 112
    # TCA9548A channel assignments (Front moved to ch4; Left=1, Right=2, Rear=3).
    tof_front_channel: 4
    tof_left_channel: 1
    tof_right_channel: 2
    tof_rear_channel: 3
    # Clamp/fail policy for real ToF readings.
    tof_min_range_m: 0.02
    tof_max_range_m: 0.80
    tof_read_fail_value_m: 0.80
    # Diagnostic output for real ToF mode.
    tof_debug_enabled: false
    tof_debug_interval_sec: 0.1
    # Retry sensor constructor this many times during startup/reinit.
    tof_init_retries: 5
    # When all 4 directions fail consecutively, auto reinitialize ToF readers.
    tof_reinit_after_fail_count: 8
    # Poll the MPU6050 IMU on the shared I2C bus and log acceleration (only in real-sensor mode).
    mpu_enabled: true
    # MPU6050 I2C address (default 0x68 = 104; AD0 high = 0x69 = 105).
    mpu_addr: 104
    # MPU6050 dedicated polling rate (Hz). Runs on its own timer/thread, independent of ToF.
    mpu_poll_hz: 200.0
    # Throttle MPU acceleration debug logs to once per N seconds.
    mpu_debug_interval_sec: 0.5
    # When MPU reads fail consecutively, auto reinitialize the sensor.
    mpu_reinit_after_fail_count: 20
    # Shared I2C bus speed (Hz). 100000 (Standard-mode) is enough for 200Hz MPU and is
    # the most reliable for marginal ToF wiring. Raise to 400000 only if all sensors are solid.
    i2c_frequency: 100000
    # --- IMU-aided pose fusion ---
    # Predict /current_position at the MPU rate (dead-reckoning from accel+gyro) and
    # correct it with the absolute, low-rate camera pose. Disable to republish the
    # camera pose 1:1 (also auto-disabled when no MPU is available).
    imu_fusion_enabled: true
    # Max publish rate (Hz) for the fused /current_position. 0 = publish every MPU sample.
    fusion_publish_hz: 100.0
    # Body-frame axis mapping (x=0, y=1, z=2). This MPU is mounted with its
    # X->robot-left, Y->robot-up, Z->robot-forward, so: forward=Z(2), left=X(0),
    # yaw-rate=gyro about up=Y(1). Flip a *_sign if that reading moves the wrong way.
    imu_forward_axis: 2
    imu_left_axis: 0
    imu_yaw_rate_axis: 1
    imu_forward_sign: 1.0
    imu_left_sign: 1.0
    imu_yaw_rate_sign: 1.0
    # Complementary-filter correction gains applied on each camera update [0..1].
    # Higher = trust camera more (less IMU drift, more camera noise/latency).
    fusion_pos_correction_gain: 0.5
    fusion_vel_correction_gain: 0.1
    fusion_heading_correction_gain: 0.4
    # Online gyro-bias learning rate from the heading residual.
    fusion_gyro_bias_gain: 0.02
    # Velocity bleed-off time constant (sec) bounding accel-integration drift.
    fusion_vel_damping_tau: 1.0
    # Ignore horizontal accel below this magnitude (m/s^2) as noise.
    fusion_accel_deadband: 0.08
    # Clamp estimated speed (m/s).
    fusion_max_speed: 2.0
    # Hard-reset the estimate to the camera pose if it disagrees by more than this (m).
    fusion_reset_pos_threshold: 0.5
    # Zero-velocity update: clamp velocity to 0 when the robot is detected still.
    fusion_zupt_enabled: true
    fusion_zupt_accel_thresh: 0.15
    fusion_zupt_gyro_thresh: 0.05
    fusion_zupt_min_duration: 0.2
    # Stationary samples collected at startup to estimate accel/gyro bias (keep the
    # robot still during startup). 200 samples @ 200Hz = ~1s. 0 disables calibration.
    fusion_calib_samples: 200
    # After this many seconds without a new camera pose, stop publishing the
    # IMU-dead-reckoned estimate and publish NO-TAG on /current_position instead.
    fusion_camera_stale_timeout_sec: 5.0

front_camera_node:
  ros__parameters:
    # Use local USB camera when true; use web upstream camera when false.
    use_real_sensor: true
    # Preferred USB camera device path. Empty = use index (better when USB port changed).
    usb_camera_device: ''
    # Fallback USB camera index when usb_camera_device is empty/unavailable.
    usb_camera_index: 0
    # Upstream host for front camera JPEG.
    camera_remote_host: 192.168.50.2
    # Upstream port for front camera JPEG.
    camera_remote_port: 5003
    # URL path for front camera JPEG.
    camera_path: /data/front_camera
    # ROS topic to publish the front camera image.
    camera_topic: /front_camera
    # Poll rate for front camera JPEG (Hz). USB capture or upstream HTTP fetch.
    camera_poll_hz: 10.0
    # HTTP timeout for front camera JPEG requests (sec).
    camera_request_timeout: 1.0
    # USB camera capture resolution (pixels). 0 = use camera default.
    # Capture at full-FOV resolution; requesting a smaller resolution directly
    # makes many USB cameras center-crop the sensor (narrower FOV) instead of
    # scaling the full frame.
    camera_width: 1920
    camera_height: 1080
    # Downsample the captured full-FOV frame to this size before publishing.
    # 0 = publish at capture resolution. Keeps original FOV, fewer pixels.
    # Intrinsics (real_camera_intrinsic.yaml) must match this output resolution.
    output_width: 960
    output_height: 540

ball_detection_node:
  ros__parameters:
    # Master switch for ball detection inference/publishing loop.
    ball_detection_enabled: true
    # Input topic consumed by Roboflow detector.
    front_camera_topic: /front_camera
    # Always-published visualization topic from ball detection node.
    ball_detection_image_topic: /ball_detection_image
    # Topic publishing best detected ball 2D pose (normalized image x/y) and confidence.
    ball_pose_topic: /ball_pose
    # Topic publishing all detected balls JSON payload.
    ball_detections_topic: /ball_detections
    # Robot pose topic used to convert camera-relative ball positions to world coordinates.
    current_position_topic: /current_position
    # Text topic mirroring absolute ball positions for decision module.
    visible_balls_topic: /visible_balls
    # Local Roboflow Inference server base URL on Raspberry Pi.
    local_inference_url: http://127.0.0.1:9001
    # Local model route in inference server (usually dataset/version).
    local_model_id: unibot-ball-detection/1
    # Roboflow API key for local inference server (optional; required only when server enforces auth).
    roboflow_api_key: ''
    # HTTP timeout for Roboflow inference request (sec).
    request_timeout_sec: 1.0
    # Inference timer frequency (Hz). Inference still runs only when robot_motion_status=stopped.
    infer_hz: 1.0
    # Downscale frame to this height (px) before inference; boxes are scaled back to
    # full resolution for drawing and 3D back-projection. 0 = no downscaling.
    infer_image_height: 180
    # Filter out detections below this confidence.
    min_confidence: 0.25
    # Log inference timing breakdown ([infer_time] encode/request/tick_total, etc.).
    perf_logs: true
    # Throttle perf logs to once per N seconds per message key.
    perf_log_every_sec: 0.0
    # Run inference only while motion_control reports 'stopped'.
    robot_motion_status_topic: /robot_motion_status
    # Real camera intrinsic YAML path; empty = auto-detect package config/real_camera_intrinsic.yaml.
    camera_intrinsic_path: ''
    # Ball physical diameter (meters), used to estimate depth from bbox size.
    ball_diameter_m: 0.043
    # Ping-pong ball physical diameter (meters).
    ping_ball_diameter_m: 0.040
    # Metal ball physical diameter (meters).
    metal_ball_diameter_m: 0.020
    # Camera optical center height in world/ground frame (meters).
    camera_height_m: 0.210
    # Ping-pong ball center height in world/ground frame (meters).
    ping_ball_center_height_m: 0.020
    # Metal ball center height in world/ground frame (meters).
    metal_ball_center_height_m: 0.010
    # Camera offset in robot frame (meters), where +x is forward and +y is left.
    camera_offset_x_robot: 0.105
    camera_offset_y_robot: 0.0

timer:
  ros__parameters:
    # Simulation clock publish rate on /time (Hz). Requires /run=on to advance.
    publish_hz: 10.0

decision_node:
  ros__parameters:
    # Decision loop tick rate (Hz).
    tick_hz: 10.0
    # Actual decision timer rate (Hz). Timer uses this, not tick_hz above.
    fallback_tick_hz: 1.0
    # Decision mode string (selects handler in decision_cruise). improved_nearest_v3_5, planned
    mode: improved_nearest_v3_5
    # Fallback speed when not provided by planner.
    default_speed: 0.3
    # F1: visible-ball field bound (m); |x| and |y| must be <= this to enter candidate pool.
    target_field_bound_m: 0.85
    # F2: skip targets closer than this to the robot (m).
    target_min_distance_m: 0.15
    # F3: skip targets within this distance of the current dynamic waypoint (m).
    target_retarget_min_distance_m: 0.1
    # Active home colour: yellow | green | purple | orange
    # Change this value to select which home position the robot returns to at end of game.
    home_colour: purple
    # Home positions [x, y, degrees] — Double-check the value for the degrees
    home_yellow: [0.0, 0.9, 180.0]
    home_green: [-0.9, 0.0, -90.0]
    home_purple: [0.0, -0.9, 0.0]
    home_orange: [0.9, 0.0, 90.0]

pose_estimation_camera:
  ros__parameters:
    # Enable pose_estimation node and publish /current_position.
    pose_estimation: true
    # Input camera topic for pose estimation.
    camera_topic: /front_camera
    # Intrinsic path override (ignored — always uses real_camera_intrinsic.yaml).
    intrinsic_path: ''
    # Override tag map JSON path (empty = use package default).
    tag_map_path: ''
    # Camera offset from robot center along +x (meters).
    camera_offset_x: 0.105
    # AprilTag / processed_image processing rate (Hz). 0 = run on every /front_camera frame.
    tick_hz: 10.0
    # Throttle pose logs to once per N seconds. 0 = log every run.
    log_every_sec: 0.0
    # Allow pose estimation on legacy OpenCV (<4.7). May crash on some builds.
    allow_legacy_opencv: true
    # Skip AprilTag/PnP while motion_control reports 'moving'.
    robot_motion_status_topic: /robot_motion_status
    # Smooth camera pose with a Kalman filter before publishing /current_position_camera.
    use_kalman_filter: false

motion_control_node:
  ros__parameters:
    # Waypoint-following control loop rate (Hz).
    control_hz: 10.0
    # Publish /robot_motion_status moving|stopped (Hz). ball_detection waits for stopped.
    motion_status_hz: 20.0
    # Encoder debug print rate (Hz). 0 disables periodic prints.
    encoder_debug_hz: 10.0
    # Robot pose input (geometry_msgs/PoseStamped) used for navigation.
    position_topic: /current_position
    # Target waypoint input (std_msgs/String '(x, y, theta_deg)').
    waypoint_topic: /dynamic_waypoint
    # Output topic publishing 'going' / 'reached' for the active waypoint.
    waypoint_status_topic: /waypoint_status
    # PWM duty cycle (0..1) when driving straight toward the waypoint.
    drive_speed: 1.0
    # Proportional gain: differential PWM = kp * heading_error_rad while driving.
    drive_heading_kp: 0.8
    # Cap |left_pwm - right_pwm| during drive heading correction.
    drive_heading_max_diff: 0.35
    # Stop and in-place rotate while driving if |heading error| exceeds this (deg).
    drive_rotate_heading_deg: 15.0
    # |heading error| (deg) at/above which rotate PWM stays at rotate_pwm_high; below
    # this, PWM ramps linearly down to rotate_pwm_min as error approaches zero.
    rotate_heading_slowdown_deg: 45.0
    # Heading-rotate PWM (0..1) at/above rotate_heading_slowdown_deg.
    rotate_pwm_high: 0.75
    # Heading-rotate PWM (0..1) when |heading error| approaches zero.
    rotate_pwm_min: 0.05
    # Exit aligned only when |error| > heading_tolerance_deg + this (prevents edge hunting).
    rotate_align_hysteresis_deg: 2.0
    # Suppress left/right flip below this |error| (deg) to reduce near-target jitter.
    rotate_direction_flip_deg: 3.0
    # Max |dPWM/dt| on 0..1 scale; 0 disables slew limiting.
    rotate_pwm_slew_per_s: 10.0
    # In-place rotation aligns heading until |heading error| is within this band (degrees).
    heading_tolerance_deg: 3.0
    # Within this distance (m), use near_target_heading_tolerance_deg instead; 0 disables.
    near_target_distance_m: 0.25
    # Relaxed |heading error| band (degrees) for align / mid-drive re-rotate when near target.
    near_target_heading_tolerance_deg: 10.0
    # Scale in-place rotate PWM when near target (0..1); lowers effective P-gain vs far.
    near_target_rotate_pwm_scale: 0.3
    # 'reached' (and stop) when |lateral offset| in robot frame is within this (meters).
    position_tolerance_m: 0.1
    # Robot-frame forward axis stop band (meters): target x_robot must lie in [min, max].
    longitudinal_stop_min_m: -0.2
    longitudinal_stop_max_m: 0.05
    # Stopped dwell (seconds) between rotate and drive, and after drive completes.
    phase_pause_s: 1.0
    # Stopped dwell (seconds) at a reached waypoint before starting the next target.
    waypoint_reached_pause_s: 0.01
    # Quadrature encoder counts per wheel output-shaft revolution.
    counts_per_rev: 488.0
    # Wheel JointState publish rate (Hz) for differential-drive odometry.
    wheel_state_hz: 50.0
    # Topic publishing left/right wheel position (rad) and velocity (rad/s).
    wheel_state_topic: /wheel_joint_states
